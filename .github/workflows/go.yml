name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - run: go mod download

      - run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o goblog-linux-amd64 main.go

      - run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o goblog-windows-amd64.exe main.go

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            goblog-linux-amd64
            goblog-windows-amd64.exe